<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Research</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#111d35; --bg2:#182340; --bg3:#1e2a4a;
    --border:#263560; --border2:#324272; --border3:#4a5e9a;
    --text:#eef2ff; --text2:#d4dcff; --muted:#6878b8; --muted2:#8a9dd4;
    --accent:#a5b4fc; --teal:#5eead4; --yellow:#fcd34d;
    --green:#4ade80; --red:#f87171;
  }
  body { background:var(--bg); color:var(--text); font-family:'IBM Plex Mono',monospace; min-height:100vh; padding:32px 28px; max-width:720px; margin:0 auto; }
  header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:24px; padding-bottom:14px; border-bottom:1px solid var(--border2); }
  h1 { font-size:12px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent); }
  #clock { font-size:13px; color:var(--muted2); letter-spacing:0.05em; }
  .tabs { display:flex; gap:4px; margin-bottom:24px; border-bottom:1px solid var(--border2); }
  .tab-btn { font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); background:transparent; border:1px solid transparent; border-bottom:none; padding:8px 18px; cursor:pointer; border-radius:4px 4px 0 0; transition:color .1s,background .1s; position:relative; bottom:-1px; }
  .tab-btn:hover { color:var(--text2); }
  .tab-btn.active { color:var(--accent); background:var(--bg2); border-color:var(--border2); border-bottom-color:var(--bg2); }
  .tab-btn .badge { display:inline-block; background:var(--accent); color:var(--bg); font-size:8px; font-weight:600; padding:1px 5px; border-radius:8px; margin-left:5px; vertical-align:middle; }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }
  .yesterday-banner { background:#1a2240; border:1px solid var(--border3); border-radius:6px; padding:12px 16px; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .yesterday-banner .label { font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
  .yesterday-banner .content { font-size:10px; color:var(--text2); flex:1; text-align:center; }
  .yesterday-edit { font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--muted); background:transparent; border:1px solid var(--border2); padding:4px 10px; border-radius:3px; cursor:pointer; white-space:nowrap; transition:color .1s,border-color .1s; }
  .yesterday-edit:hover { color:var(--text2); border-color:var(--muted2); }
  .meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .legend { display:flex; gap:16px; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:10px; color:var(--muted2); letter-spacing:0.06em; }
  .legend-dot { width:6px; height:6px; border-radius:50%; }
  .date-badge { font-size:10px; color:var(--accent); letter-spacing:0.06em; background:#1a2240; border:1px solid var(--border2); padding:4px 10px; border-radius:4px; }
  .section-label { font-size:9px; letter-spacing:0.16em; text-transform:uppercase; color:var(--muted); margin:20px 0 8px 4px; }
  .city { margin-bottom:6px; border:1px solid var(--border); border-radius:6px; overflow:hidden; background:var(--bg2); }
  .city.anchor { border-color:var(--border3); background:var(--bg3); }
  .city-row { display:grid; grid-template-columns:100px 1fr 1fr 1fr 1fr 90px 68px; align-items:stretch; min-height:44px; }
  .city-name { display:flex; flex-direction:column; justify-content:center; padding:0 14px; font-size:11px; font-weight:500; letter-spacing:0.1em; color:var(--text2); border-right:1px solid var(--border); text-transform:uppercase; }
  .city-name small { font-size:9px; color:var(--muted); font-weight:400; margin-top:3px; }
  .city-name .anchor-tag { font-size:8px; color:var(--accent); font-weight:500; margin-top:3px; }
  .link-cell { display:flex; align-items:center; justify-content:center; border-right:1px solid var(--border); text-decoration:none; font-size:10px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; transition:background .1s; }
  .link-cell.poly { color:var(--accent); } .link-cell.poly:hover { background:#1e2a50; }
  .link-cell.afd { color:var(--teal); } .link-cell.afd:hover { background:#0f2028; }
  .link-cell.windy { color:#38bdf8; } .link-cell.windy:hover { background:#0a1e2e; }
  .note-row { display:flex; align-items:center; border-top:1px solid var(--border); background:var(--bg); min-height:32px; }
  .note-label { font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); padding:0 12px; white-space:nowrap; border-right:1px solid var(--border); min-width:100px; display:flex; align-items:center; height:32px; }
  .note-input { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted2); background:transparent; border:none; outline:none; flex:1; padding:0 14px; height:32px; }
  .note-input::placeholder { color:var(--muted); opacity:0.6; }
  .note-input:focus { color:var(--text2); }
  .toggle-cell { display:flex; align-items:center; justify-content:center; border-right:1px solid var(--border); padding:4px; }
  .toggle { display:flex; border-radius:4px; overflow:hidden; border:1px solid var(--border2); }
  .toggle-opt { font-size:8px; font-weight:600; letter-spacing:0.06em; padding:5px 10px; cursor:pointer; border:none; background:transparent; color:var(--muted); font-family:'IBM Plex Mono',monospace; transition:background .1s,color .1s; }
  .toggle-opt.skip.active { background:#2a1a1a; color:var(--red); }
  .toggle-opt.trade.active { background:#0f2a1a; color:var(--green); }
  .toggle-opt:hover:not(.active) { color:var(--text2); }
  .open-all-cell { display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:9px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); transition:color .1s,background .1s; border:none; background:transparent; width:100%; height:100%; font-family:'IBM Plex Mono',monospace; }
  .open-all-cell:hover { color:var(--text2); background:#1e2a50; }
  .results-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-top:8px; }
  .result-link { display:flex; align-items:center; justify-content:center; gap:6px; padding:10px 8px; background:var(--bg2); border:1px solid var(--border); border-radius:6px; text-decoration:none; font-size:9px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted2); transition:background .1s,border-color .1s,color .1s; }
  .result-link:hover { background:#1e2a50; border-color:var(--border3); color:var(--text2); }
  .result-link .dot { width:5px; height:5px; border-radius:50%; background:var(--teal); flex-shrink:0; }
  .footer { margin-top:20px; padding-top:14px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .open-everything { font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--text2); background:#1a2240; border:1px solid var(--border3); padding:10px 20px; cursor:pointer; border-radius:4px; transition:background .12s,border-color .12s; }
  .open-everything:hover { background:#202a50; border-color:var(--muted2); }
  .footer-note { font-size:10px; color:var(--muted); letter-spacing:0.04em; }
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:16px; }
  .stat-box { background:var(--bg2); border:1px solid var(--border); border-radius:6px; padding:12px 14px; }
  .stat-label { font-size:8px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .stat-value { font-size:18px; font-weight:600; color:var(--text2); }
  .stat-value.green { color:var(--green); } .stat-value.red { color:var(--red); }
  .tracker-form { background:var(--bg2); border:1px solid var(--border); border-radius:6px; padding:18px; margin-bottom:20px; }
  .tracker-form h2 { font-size:10px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent); margin-bottom:14px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:10px; }
  .form-row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
  .form-group { display:flex; flex-direction:column; gap:5px; }
  .form-group label { font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
  .form-group input, .form-group select { font-family:'IBM Plex Mono',monospace; font-size:11px; background:var(--bg3); border:1px solid var(--border2); color:var(--text2); padding:7px 10px; border-radius:4px; outline:none; transition:border-color .1s; width:100%; }
  .form-group input:focus, .form-group select:focus { border-color:var(--accent); }
  .form-group select option { background:var(--bg3); }
  .add-btn { font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--bg); background:var(--accent); border:none; padding:10px 22px; border-radius:4px; cursor:pointer; transition:opacity .1s; }
  .add-btn:hover { opacity:.85; }
  .trade-table-wrap { overflow-x:auto; }
  .trade-table { width:100%; border-collapse:collapse; font-size:10px; }
  .trade-table th { text-align:left; padding:8px 10px; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border2); white-space:nowrap; }
  .trade-table td { padding:9px 10px; border-bottom:1px solid var(--border); color:var(--text2); white-space:nowrap; }
  .trade-table tr:last-child td { border-bottom:none; }
  .trade-table tr:hover td { background:#1a2240; }
  .win { color:var(--green); font-weight:600; } .loss { color:var(--red); font-weight:600; } .open-tag { color:var(--yellow); }
  .del-btn { font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--muted); background:transparent; border:none; cursor:pointer; padding:2px 6px; border-radius:3px; transition:color .1s,background .1s; }
  .del-btn:hover { color:var(--red); background:#2a1a1a; }
  .empty { text-align:center; padding:32px; color:var(--muted); font-size:10px; letter-spacing:0.08em; }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(10,12,25,.85); z-index:100; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--bg2); border:1px solid var(--border3); border-radius:8px; padding:24px; width:340px; max-width:90vw; }
  .modal h3 { font-size:11px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent); margin-bottom:16px; }
  .mfield { display:flex; flex-direction:column; gap:5px; margin-bottom:12px; }
  .mfield label { font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
  .mfield input, .mfield select { font-family:'IBM Plex Mono',monospace; font-size:11px; background:var(--bg3); border:1px solid var(--border2); color:var(--text2); padding:8px 10px; border-radius:4px; outline:none; }
  .mfield input:focus { border-color:var(--accent); }
  .modal-btns { display:flex; gap:8px; margin-top:16px; }
  .msave { font-family:'IBM Plex Mono',monospace; font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; background:var(--accent); color:var(--bg); border:none; padding:9px 18px; border-radius:4px; cursor:pointer; }
  .mcancel { font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; background:transparent; color:var(--muted); border:1px solid var(--border2); padding:9px 18px; border-radius:4px; cursor:pointer; }
</style>
</head>
<body>
<header><h1>Morning Research</h1><span id="clock"></span></header>
 
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('research',this)">Research</button>
  <button class="tab-btn" onclick="switchTab('tracker',this)">Tracker <span class="badge" id="trade-count">0</span></button>
</div>
 
<!-- TAB: RESEARCH -->
<div class="tab-panel active" id="tab-research">
  <div class="yesterday-banner">
    <span class="label">Yesterday</span>
    <span class="content" id="yd-display">— tap edit to log result</span>
    <button class="yesterday-edit" onclick="openModal()">Edit</button>
  </div>
  <div class="meta">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#a5b4fc"></div>Poly</div>
      <div class="legend-item"><div class="legend-dot" style="background:#5eead4"></div>AFD</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fcd34d"></div>Hourly</div>
      <div class="legend-item"><div class="legend-dot" style="background:#38bdf8"></div>Windy</div>
    </div>
    <div class="date-badge" id="date-display"></div>
  </div>
  <div class="section-label">US Central / Eastern — anchors first</div>
  <div id="cities-main"></div>
  <div class="section-label">US West</div>
  <div id="cities-west"></div>
  <div class="section-label">Canada</div>
  <div id="cities-canada"></div>
  <div class="section-label">Results — Weather Underground</div>
  <div class="results-grid" id="results-grid"></div>
  <div class="footer">
    <button class="open-everything" onclick="openEverything()">Open everything →</button>
    <span class="footer-note" id="tab-count"></span>
  </div>
</div>
 
<!-- TAB: TRACKER -->
<div class="tab-panel" id="tab-tracker">
  <div class="stats-row">
    <div class="stat-box"><div class="stat-label">Trades</div><div class="stat-value" id="s-total">0</div></div>
    <div class="stat-box"><div class="stat-label">Wins</div><div class="stat-value green" id="s-wins">0</div></div>
    <div class="stat-box"><div class="stat-label">Losses</div><div class="stat-value red" id="s-losses">0</div></div>
    <div class="stat-box"><div class="stat-label">P&amp;L</div><div class="stat-value" id="s-pnl">$0.00</div></div>
  </div>
  <div class="tracker-form">
    <h2>Log Trade</h2>
    <div class="form-grid">
      <div class="form-group"><label>Date</label><input type="date" id="f-date"></div>
      <div class="form-group"><label>City</label>
        <select id="f-city"><option>Chicago</option><option>Atlanta</option><option>Dallas</option><option>NYC</option><option>Miami</option><option>Seattle</option><option>San Fran</option><option>LA</option><option>Toronto</option></select>
      </div>
      <div class="form-group"><label>NWS High</label><input type="text" id="f-nws" placeholder="e.g. 76°F"></div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>Bucket</label><input type="text" id="f-bucket" placeholder="e.g. 76–77°F"></div>
      <div class="form-group"><label>Entry ¢</label><input type="number" id="f-entry" placeholder="e.g. 16.7" step="0.1"></div>
      <div class="form-group"><label>Size $</label><input type="number" id="f-size" placeholder="e.g. 20"></div>
    </div>
    <div class="form-row2">
      <div class="form-group"><label>Exit ¢ (blank if open)</label><input type="number" id="f-exit" placeholder="e.g. 42.0" step="0.1"></div>
      <div class="form-group"><label>Outcome</label>
        <select id="f-outcome"><option value="open">Open</option><option value="win">Win</option><option value="loss">Loss</option><option value="skip">Skip</option></select>
      </div>
    </div>
    <button class="add-btn" onclick="addTrade()">+ Log trade</button>
  </div>
  <div class="trade-table-wrap">
    <table class="trade-table">
      <thead><tr><th>Date</th><th>City</th><th>NWS</th><th>Bucket</th><th>Entry</th><th>Exit</th><th>Size</th><th>P&amp;L</th><th>Result</th><th></th></tr></thead>
      <tbody id="trade-tbody"></tbody>
    </table>
    <div class="empty" id="empty-state">No trades logged yet.</div>
  </div>
</div>
 
<!-- YESTERDAY MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Yesterday's Result</h3>
    <div class="mfield"><label>City</label>
      <select id="yd-city"><option>Chicago</option><option>Atlanta</option><option>Dallas</option><option>NYC</option><option>Miami</option><option>Seattle</option><option>San Fran</option><option>LA</option><option>Toronto</option></select>
    </div>
    <div class="mfield"><label>Actual High (from WUnderground)</label><input type="text" id="yd-actual" placeholder="e.g. 42°F"></div>
    <div class="mfield"><label>Bucket resolved</label><input type="text" id="yd-bucket" placeholder="e.g. 42–43°F"></div>
    <div class="mfield"><label>Your outcome</label>
      <select id="yd-outcome"><option value="skip">Skipped</option><option value="win">Win</option><option value="loss">Loss</option></select>
    </div>
    <div class="modal-btns">
      <button class="msave" onclick="saveYesterday()">Save</button>
      <button class="mcancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>
 
<script>
const citiesMain=[
  {name:"Chicago",polySlug:"chicago",anchor:true,
   afd:"https://forecast.weather.gov/product.php?site=NWS&issuedby=lot&product=AFD&format=CI&version=1&glossary=1",
   hourly:"https://forecast.weather.gov/MapClick.php?lat=41.9796&lon=-87.9045&unit=0&lg=english&FcstType=graphical",
   windyCoords:"41.980/-87.905",
   wund:"https://www.wunderground.com/history/daily/us/il/chicago/KORD"},
  {name:"Atlanta",polySlug:"atlanta",anchor:true,
   afd:"https://forecast.weather.gov/product.php?site=FFC&issuedby=FFC&product=AFD&format=CI&version=1&glossary=1",
   hourly:"https://forecast.weather.gov/MapClick.php?lat=33.6367&lon=-84.4279&unit=0&lg=english&FcstType=graphical",
   windyCoords:"33.637/-84.428",
   wund:"https://www.wunderground.com/history/daily/us/ga/atlanta/KATL"},
  {name:"Dallas",polySlug:"dallas",anchor:false,
   afd:"https://forecast.weather.gov/product.php?site=FWD&issuedby=FWD&product=AFD&format=CI&version=1&glossary=1",
   hourly:"https://forecast.weather.gov/MapClick.php?lat=32.8972&lon=-97.0377&unit=0&lg=english&FcstType=graphical",
   windyCoords:"32.897/-97.038",
   wund:"https://www.wunderground.com/history/daily/us/tx/dallas/KDFW"},
  {name:"NYC",polySlug:"nyc",anchor:false,
   afd:"https://forecast.weather.gov/product.php?site=OKX&issuedby=OKX&product=AFD&format=CI&version=1&glossary=1",
   hourly:"https://forecast.weather.gov/MapClick.php?lat=40.7761&lon=-73.8727&unit=0&lg=english&FcstType=graphical",
   windyCoords:"40.776/-73.873",
   wund:"https://www.wunderground.com/history/daily/us/ny/new-york-city/KLGA"},
  {name:"Miami",polySlug:"miami",anchor:false,
   afd:"https://forecast.weather.gov/product.php?site=MFL&issuedby=MFL&product=AFD&format=CI&version=1&glossary=1",
   hourly:"https://forecast.weather.gov/MapClick.php?lat=25.7959&lon=-80.2870&unit=0&lg=english&FcstType=graphical",
   windyCoords:"25.796/-80.287",
   wund:"https://www.wunderground.com/history/daily/us/fl/miami/KMIA"},
];
const citiesWest=[
  {name:"Seattle",polySlug:"seattle",anchor:false,
   afd:"https://forecast.weather.gov/product.php?site=SEW&issuedby=SEW&product=AFD&format=CI&version=1&glossary=1",
   hourly:"https://forecast.weather.gov/MapClick.php?lat=47.4502&lon=-122.3088&unit=0&lg=english&FcstType=graphical",
   windyCoords:"47.450/-122.309",
   wund:"https://www.wunderground.com/history/daily/us/wa/seattle/KSEA"},
  {name:"San Fran",polySlug:"san-francisco",anchor:false,
   afd:"https://forecast.weather.gov/product.php?site=MTR&issuedby=MTR&product=AFD&format=CI&version=1&glossary=1",
   hourly:"https://forecast.weather.gov/MapClick.php?lat=37.6213&lon=-122.3790&unit=0&lg=english&FcstType=graphical",
   windyCoords:"37.621/-122.379",
   wund:"https://www.wunderground.com/history/daily/us/ca/san-francisco/KSFO"},
  {name:"LA",polySlug:"los-angeles",anchor:false,
   afd:"https://forecast.weather.gov/product.php?site=LOX&issuedby=LOX&product=AFD&format=CI&version=1&glossary=1",
   hourly:"https://forecast.weather.gov/MapClick.php?lat=33.9425&lon=-118.4081&unit=0&lg=english&FcstType=graphical",
   windyCoords:"33.943/-118.408",
   wund:"https://www.wunderground.com/history/daily/us/ca/los-angeles/KLAX"},
];
const citiesCanada=[
  {name:"Toronto",polySlug:"toronto",anchor:false,
   afd:"https://weather.gc.ca/forecast/public_bulletins_e.html?Bulletin=fpcn51.cwto",
   hourly:"https://www.weather.gc.ca/en/forecast/hourly/index.html?coords=43.655,-79.383",
   windyCoords:"43.677/-79.630",
   wund:"https://www.wunderground.com/history/daily/ca/mississauga/CYYZ"},
];
const allCities=[...citiesMain,...citiesWest,...citiesCanada];
 
function getSlug(d){const m=['january','february','march','april','may','june','july','august','september','october','november','december'];return`${m[d.getMonth()]}-${d.getDate()}-${d.getFullYear()}`;}
function getDisplay(d){const m=['january','february','march','april','may','june','july','august','september','october','november','december'];return`${m[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;}
function polyURL(slug,d){return`https://polymarket.com/event/highest-temperature-in-${slug}-on-${getSlug(d)}`;}
function windyURL(coords,d){
  const ds=d.toISOString().split('T')[0];
  return`https://www.windy.com/multimodel/${coords}?temp,${ds},i:pressure,p:cities`;
}
 
function switchTab(name,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}
 
function toggle(city,val){
  localStorage.setItem('tog_'+city,val);
  document.querySelectorAll('[data-city="'+city+'"] .toggle-opt').forEach(el=>{
    el.classList.remove('active');
    if(el.dataset.val===val)el.classList.add('active');
  });
}
 
function renderCities(cities,id){
  const now=new Date();
  const c=document.getElementById(id);
  cities.forEach(city=>{
    const poly=polyURL(city.polySlug,now);
    const windy=windyURL(city.windyCoords,now);
    const saved=localStorage.getItem('tog_'+city.name);
    const note=localStorage.getItem('note_'+city.name)||'';
    const sa=saved==='skip'?' active':'', ta=saved==='trade'?' active':'';
    const ac=city.anchor?' anchor':'';
    const sub=city.anchor?'<span class="anchor-tag">★ anchor</span>':'<small>today</small>';
    c.innerHTML+=`<div class="city${ac}"><div class="city-row">
      <div class="city-name">${city.name}${sub}</div>
      <a class="link-cell poly" href="${poly}" target="_blank">Poly</a>
      <a class="link-cell afd" href="${city.afd}" target="_blank">AFD</a>
      <a class="link-cell hourly" href="${city.hourly}" target="_blank">Hourly</a>
      <a class="link-cell windy" href="${windy}" target="_blank">Windy</a>
      <div class="toggle-cell" data-city="${city.name}"><div class="toggle">
        <button class="toggle-opt skip${sa}" data-val="skip" onclick="toggle('${city.name}','skip')">Skip</button>
        <button class="toggle-opt trade${ta}" data-val="trade" onclick="toggle('${city.name}','trade')">Trade</button>
      </div></div>
      <button class="open-all-cell" onclick="openAll(['${poly}','${city.afd}','${city.hourly}','${windy}'])">All 4</button>
    </div>
    <div class="note-row">
      <span class="note-label">Note</span>
      <input class="note-input" type="text" placeholder="AFD read / confidence / reason…" value="${note.replace(/"/g,'&quot;')}" oninput="localStorage.setItem('note_${city.name}',this.value)">
    </div></div>`;
  });
}
 
function renderResults(){
  const g=document.getElementById('results-grid');
  allCities.forEach(c=>{
    g.innerHTML+=`<a class="result-link" href="${c.wund}" target="_blank"><div class="dot"></div>${c.name}</a>`;
  });
}
 
function openAll(urls){urls.forEach((u,i)=>setTimeout(()=>window.open(u,'_blank'),i*150));}
function openEverything(){
  const now=new Date();
  allCities.flatMap(c=>[polyURL(c.polySlug,now),c.afd,c.hourly,windyURL(c.windyCoords,now)])
    .forEach((u,i)=>setTimeout(()=>window.open(u,'_blank'),i*150));
}
 
function openModal(){document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function saveYesterday(){
  const d={city:document.getElementById('yd-city').value,
    actual:document.getElementById('yd-actual').value,
    bucket:document.getElementById('yd-bucket').value,
    outcome:document.getElementById('yd-outcome').value};
  localStorage.setItem('yesterday',JSON.stringify(d));
  renderYesterday(); closeModal();
}
function renderYesterday(){
  const raw=localStorage.getItem('yesterday');
  const el=document.getElementById('yd-display');
  if(!raw){el.innerHTML='— tap edit to log result';return;}
  const d=JSON.parse(raw);
  const col=d.outcome==='win'?'#4ade80':d.outcome==='loss'?'#f87171':'#a5b4fc';
  el.innerHTML=`<span style="color:${col}">${d.outcome.toUpperCase()}</span> &nbsp;·&nbsp; ${d.city} &nbsp;·&nbsp; ${d.bucket||d.actual} &nbsp;·&nbsp; actual: ${d.actual}`;
}
 
function getTrades(){return JSON.parse(localStorage.getItem('trades')||'[]');}
function saveTrades(t){localStorage.setItem('trades',JSON.stringify(t));}
function addTrade(){
  const date=document.getElementById('f-date').value;
  const city=document.getElementById('f-city').value;
  const nws=document.getElementById('f-nws').value;
  const bucket=document.getElementById('f-bucket').value;
  const entry=parseFloat(document.getElementById('f-entry').value);
  const exitV=document.getElementById('f-exit').value;
  const size=parseFloat(document.getElementById('f-size').value);
  const outcome=document.getElementById('f-outcome').value;
  if(!date||!bucket||isNaN(entry)){alert('Date, Bucket and Entry are required.');return;}
  const exit=exitV?parseFloat(exitV):null;
  let pnl=null;
  if(exit!==null&&!isNaN(size)){const shares=(size*100)/entry;pnl=((exit-entry)/100)*shares;}
  const trades=getTrades();
  trades.unshift({id:Date.now(),date,city,nws,bucket,entry,exit,size:isNaN(size)?null:size,pnl,outcome});
  saveTrades(trades);renderTrades();updateStats();updateBadge();
  ['f-nws','f-bucket','f-entry','f-exit','f-size'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-outcome').value='open';
}
function deleteTrade(id){
  saveTrades(getTrades().filter(t=>t.id!==id));
  renderTrades();updateStats();updateBadge();
}
function renderTrades(){
  const trades=getTrades();
  const tbody=document.getElementById('trade-tbody');
  document.getElementById('empty-state').style.display=trades.length?'none':'block';
  tbody.innerHTML='';
  trades.forEach(t=>{
    const oc=t.outcome==='win'?'win':t.outcome==='loss'?'loss':'open-tag';
    const pStr=t.pnl!==null?`${t.pnl>=0?'+':''}$${t.pnl.toFixed(2)}`:'—';
    const pc=t.pnl>0?'win':t.pnl<0?'loss':'';
    tbody.innerHTML+=`<tr>
      <td>${t.date}</td><td>${t.city}</td><td>${t.nws||'—'}</td><td>${t.bucket}</td>
      <td>${t.entry}¢</td><td>${t.exit!=null?t.exit+'¢':'—'}</td>
      <td>${t.size?'$'+t.size:'—'}</td>
      <td class="${pc}">${pStr}</td>
      <td class="${oc}">${t.outcome.toUpperCase()}</td>
      <td><button class="del-btn" onclick="deleteTrade(${t.id})">✕</button></td>
    </tr>`;
  });
}
function updateStats(){
  const t=getTrades().filter(x=>x.outcome!=='skip');
  const wins=t.filter(x=>x.outcome==='win').length;
  const losses=t.filter(x=>x.outcome==='loss').length;
  const pnl=t.reduce((s,x)=>s+(x.pnl||0),0);
  document.getElementById('s-total').textContent=t.length;
  document.getElementById('s-wins').textContent=wins;
  document.getElementById('s-losses').textContent=losses;
  const el=document.getElementById('s-pnl');
  el.textContent=`${pnl>=0?'+':''}$${pnl.toFixed(2)}`;
  el.className='stat-value '+(pnl>0?'green':pnl<0?'red':'');
}
function updateBadge(){document.getElementById('trade-count').textContent=getTrades().length;}
 
const now=new Date();
document.getElementById('date-display').textContent=getDisplay(now);
document.getElementById('f-date').value=now.toISOString().split('T')[0];
renderCities(citiesMain,'cities-main');
renderCities(citiesWest,'cities-west');
renderCities(citiesCanada,'cities-canada');
renderResults();
renderYesterday();
renderTrades();
updateStats();
updateBadge();
document.getElementById('tab-count').textContent=`${allCities.length*4} tabs total`;
 
setInterval(()=>{
  document.getElementById('clock').textContent=
    new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
},1000);
document.getElementById('clock').textContent=
  new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
</script>
